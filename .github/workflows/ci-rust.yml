name: rust

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'rust-bindings'
    tags-ignore:
      - '**'
    paths:
      - 'rust/**'
      - '.github/workflows/ci-rust.yml'

  pull_request:
    paths:
      - 'rust/**'
      - '.github/workflows/ci-rust.yml'

  workflow_dispatch: ~

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --check

  clippy:
    name: clippy
    if: ${{ !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_REPO_READ_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy --features vendored --all-targets -- -D warnings

  test:
    name: test
    if: ${{ !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_REPO_READ_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --features vendored -- --test-threads=1
